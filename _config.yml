title: suimsoft-lab Tech Blog
description: 앱 개발 기록과 배포 후 운영 가이드를 정리하는 기술 블로그
url: "https://suimsoft-lab.github.io"
baseurl: ""
lang: ko-KR
timezone: Asia/Seoul
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
locale: "ko-KR"

author:
  name: suimsoft-lab

markdown: kramdown
permalink: /:categories/:title/

plugins:
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single

atom_feed:
  hide: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/suimsoft-lab"
    - label: "아기첫걸음"
      icon: "fas fa-fw fa-mobile-alt"
      url: "https://play.google.com/store/apps/details?id=com.babyfirststep.baby_first_step"
    - label: "아이지원"
      icon: "fas fa-fw fa-mobile-alt"
      url: "https://play.google.com/store/apps/details?id=com.suimworks.babysupport"
